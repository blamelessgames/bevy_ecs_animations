[package]
name = "bevy-ecs-animations"
version = "0.19.0"
edition = "2024"

[dependencies]
bevy_app = { version = "0.19.0", default-features = false }
bevy_ecs = { version = "0.19.0", default-features = false }
bevy_math = { version = "0.19.0", default-features = false, features = ["curve"]}
bevy_time = { version = "0.19.0", default-features = false }

[features]
default = [
    "std"
]
std = [
    "bevy_math/std"
]
libm = [
    "bevy_math/libm"
]
nostd-libm = [
    "bevy_math/nostd-libm"
]

[dev-dependencies]
bevy = "0.19.0"